<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Decision Log</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; max-width: 740px; margin: 2rem auto; padding: 0 1.5rem; color: #1a1a2e; line-height: 1.65; }
    h1 { font-size: 1.8rem; border-bottom: 3px solid #e63946; padding-bottom: 0.4rem; }
    .meta { color: #555; font-size: 0.9rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.1rem; color: #e63946; margin-top: 1.8rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.04em; }
    .decision-box { background: #fff5f5; border: 2px solid #e63946; border-radius: 8px; padding: 1rem 1.2rem; margin: 0.8rem 0 1.5rem; font-size: 1.05rem; font-weight: 500; }
    .option { background: #f8f9fa; border-radius: 6px; padding: 0.8rem 1rem; margin-bottom: 0.6rem; }
    .option-header { font-weight: 600; margin-bottom: 0.3rem; }
    .pros { color: #2d6a4f; }
    .cons { color: #c0392b; }
    ul { padding-left: 1.4rem; margin: 0.3rem 0; }
    li { margin-bottom: 0.25rem; font-size: 0.95rem; }
    .impact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-top: 0.5rem; }
    .impact-item { background: #f8f9fa; padding: 0.5rem 0.8rem; border-radius: 6px; font-size: 0.9rem; }
    .impact-item strong { display: block; font-size: 0.75rem; text-transform: uppercase; color: #e63946; }
  </style>
</head>
<body>
  <h1></h1>
  <div class="meta">📅  · Decision Maker: </div>

  <h2>Context</h2>
  <p></p>

  <h2>Decision</h2>
  <div class="decision-box"></div>

  <h2>Options Considered</h2>
  <div class="option">
    <div class="option-header">Option A: </div>
    <span class="pros">Pros:</span>
    <ul><li></li></ul>
    <span class="cons">Cons:</span>
    <ul><li></li></ul>
  </div>
  <div class="option">
    <div class="option-header">Option B: </div>
    <span class="pros">Pros:</span>
    <ul><li></li></ul>
    <span class="cons">Cons:</span>
    <ul><li></li></ul>
  </div>

  <h2>Expected Impact</h2>
  <div class="impact-grid">
    <div class="impact-item"><strong>Timeline</strong> </div>
    <div class="impact-item"><strong>Cost</strong> </div>
    <div class="impact-item"><strong>Risk Level</strong> </div>
    <div class="impact-item"><strong>Reversibility</strong> </div>
  </div>

  <h2>Follow-up</h2>
  <ul>
    <li></li>
  </ul>
</body>
</html>
