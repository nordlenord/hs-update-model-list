<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meeting Notes</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1.5rem; color: #1a1a2e; line-height: 1.6; }
    h1 { font-size: 1.8rem; border-bottom: 3px solid #4361ee; padding-bottom: 0.4rem; margin-bottom: 0.3rem; }

    ul, ol { padding-left: 1.4rem; }
    li { margin-bottom: 0.35rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    th { background: #4361ee; color: #fff; text-align: left; padding: 0.5rem 0.75rem; font-weight: 600; font-size: 0.9rem; }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #e0e0e0; }
    tr:hover td { background: #f0f4ff; }
    .badge { display: inline-block; background: #e8edff; color: #4361ee; padding: 0.15rem 0.6rem; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }
  </style>
</head>
