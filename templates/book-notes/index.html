<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Notes</title>
  <style>
    body { font-family: 'Georgia', 'Times New Roman', serif; max-width: 700px; margin: 2rem auto; padding: 0 1.5rem; color: #2d2d2d; line-height: 1.7; }
    h1 { font-size: 1.8rem; font-weight: 400; margin-bottom: 0.2rem; }
    .book-meta { background: #f4f1eb; border-radius: 8px; padding: 1rem 1.2rem; margin-bottom: 1.8rem; }
    .book-meta p { margin: 0.25rem 0; font-size: 0.95rem; color: #555; }
    h2 { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 1rem; color: #8b5e3c; margin-top: 1.8rem; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
    .rating { font-size: 1.3rem; letter-spacing: 0.15em; margin: 0.3rem 0 1rem; }
    blockquote { border-left: 3px solid #d4a574; margin: 0.8rem 0; padding: 0.4rem 1rem; color: #6b4e2e; font-style: italic; background: #fdf8f3; }
    ul { padding-left: 1.3rem; }
    li { margin-bottom: 0.4rem; }
    .tag { display: inline-block; background: #f4e8d9; color: #8b5e3c; padding: 0.1rem 0.55rem; border-radius: 10px; font-size: 0.8rem; font-family: 'Segoe UI', sans-serif; margin-right: 0.3rem; font-weight: 600; }
    hr { border: none; border-top: 1px solid #e8dcc8; margin: 1.5rem 0; }
  </style>
</head>
<body>
  <h1></h1>
  <div class="book-meta">
    <p><strong>Author:</strong> </p>
    <p><strong>Published:</strong> </p>
    <p><strong>Genre:</strong> </p>
    <p><strong>Read Date:</strong> </p>
  </div>

  <h2>Rating</h2>
  <p class="rating">☆☆☆☆☆</p>

  <h2>One-Sentence Summary</h2>
  <p></p>

  <h2>Key Takeaways</h2>
  <ul>
    <li></li>
    <li></li>
    <li></li>
  </ul>

  <h2>Favorite Quotes</h2>
  <blockquote></blockquote>

  <hr>

  <h2>How It Changed My Thinking</h2>
  <p></p>

  <h2>Who Should Read This</h2>
  <p></p>

  <h2>Tags</h2>
  <p><span class="tag"></span></p>
</body>
</html>
