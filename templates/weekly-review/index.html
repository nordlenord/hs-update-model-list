<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weekly Review</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1.5rem; color: #1a1a2e; line-height: 1.65; }
    h1 { font-size: 1.8rem; border-bottom: 3px solid #e76f51; padding-bottom: 0.4rem; }

    .progress-section { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; margin: 0.5rem 0 1rem; }
    .progress-card { text-align: center; padding: 0.8rem; border-radius: 8px; }
    .progress-card.done { background: #d8f3dc; color: #2d6a4f; }
    .progress-card.wip { background: #fff3cd; color: #856404; }
    .progress-card.blocked { background: #fde8e8; color: #c0392b; }
    .progress-card .number { font-size: 1.6rem; font-weight: 700; }
    .progress-card .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    ul { padding-left: 1.4rem; }
    li { margin-bottom: 0.4rem; }
    .rating { font-size: 1.2rem; letter-spacing: 0.15em; }
    hr { border: none; border-top: 1px solid #eee; margin: 1.5rem 0; }
  </style>
</head>
