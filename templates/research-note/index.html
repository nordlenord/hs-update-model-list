<!DOCTYPE html>

  <style>
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; max-width: 740px; margin: 2rem auto; padding: 0 1.5rem; color: #1a1a2e; line-height: 1.65; }
    h1 { font-size: 1.8rem; border-bottom: 3px solid #2d6a4f; padding-bottom: 0.4rem; }

    .source-box p { margin: 0.2rem 0; font-size: 0.95rem; }
    ul { padding-left: 1.4rem; }
    li { margin-bottom: 0.4rem; }
    blockquote { border-left: 3px solid #95d5b2; margin: 1rem 0; padding: 0.5rem 1rem; background: #f0f7f4; color: #2d4a3e; font-style: italic; border-radius: 0 4px 4px 0; }
    .tag { display: inline-block; background: #d8f3dc; color: #2d6a4f; padding: 0.1rem 0.55rem; border-radius: 10px; font-size: 0.8rem; margin-right: 0.3rem; font-weight: 600; }
  </style>
</head>
